<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGO AI Scanner</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>LEGO AI Scanner</h1>
        <input type="file" id="imageUpload" accept="image/*">
        <label for="imageUpload" class="btn">CHOOSE PART</label>
        <img id="preview" src="#" alt="Preview">
        <button id="scan-btn" class="btn" style="display:none; background-color: #0055ad;">SCAN PART</button>
        <div id="result">
            <h2 id="part-name">Ready to work</h2>
        </div>
    </div>

    <script>
        const URL = "https://teachablemachine.withgoogle.com/models/9a2XHS5dZ/";
        
        const legoDatabase = {
            "Brown Brick 2x2": { price: "EUR 0.0056", ids: "4623773, 6014520, 6092677" },
            "Blue Grille 2x1": { price: "EUR 0.0009", ids: "6152109" },
            "Red Round Plate 2x2": { price: "EUR 0.001", ids: "6132541" },
            "Dark Grey Brick 2x2": { price: "EUR 0.0056", ids: "4211060" },
            "Grey Brick With 2 Studs 2x1": { price: "EUR 0.0086", ids: "6015344" },
            "Black Plate 2x3": { price: "EUR 0.0062", ids: "302126" },
            "Orange Plate 2x2": { price: "EUR 0.0022", ids: "4159007" },
            "Grey Brick 6x2": { price: "EUR 0.01", ids: "4211795, 4274668" },
            "Black Brick 4x1": { price: "EUR 0.006", ids: "301026" },
            "Tan Brick 4x1": { price: "EUR 0.006", ids: "301005" },
            "Grey Plate With 4 Studs 4x3": { price: "EUR 0.02", ids: "6132741, 6550154" },
            "Grey Corner Brick 2x2": { price: "EUR 0.0086", ids: "4211109" },
            "Dark Orange Plate With 1 Stud 1x2": { price: "EUR 0.0043", ids: "6092602" },
            "Black Brick 1x1": { price: "EUR 0.0034", ids: "300526" },
            "Grey Slope 45 2x1": { price: "EUR 0.001", ids: "4211135" },
            "Grey Inverted Slope 2x2": { price: "EUR 0.0009", ids: "4211000" },
            "Orange Plate 4x1": { price: "EUR 0.0008", ids: "4118782" },
            "Orange Plate 2x1": { price: "EUR 0.0026", ids: "4177932" },
            "Inverted Orange Slope 33 3x2": { price: "EUR 0.01", ids: "4121737" },
            "Tan Masonry Brick 2x1": { price: "EUR 0.01", ids: "4646577" }
        };

        let model, maxPredictions;

        async function init() {
            model = await tmImage.load(URL + "model.json", URL + "metadata.json");
            maxPredictions = model.getTotalClasses();
        }

        document.getElementById('imageUpload').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function() {
                const img = document.getElementById('preview');
                img.src = reader.result;
                img.style.display = 'block';
                document.getElementById('scan-btn').style.display = 'inline-block';
                document.getElementById('result').innerHTML = '<h2 id="part-name">READY TO SCAN</h2>';
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        document.getElementById('scan-btn').addEventListener('click', async function() {
            const img = document.getElementById('preview');
            const prediction = await model.predict(img);
            
            let bestMatch = { className: "", probability: 0 };
            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability > bestMatch.probability) {
                    bestMatch = prediction[i];
                }
            }

            const detectedRaw = bestMatch.className.replace(/\./g, '').trim().toLowerCase();
            
            const dbKey = Object.keys(legoDatabase).find(key => {
                const k = key.toLowerCase();
                return detectedRaw.includes(k) || k.includes(detectedRaw);
            });

            const data = legoDatabase[dbKey];
            const resultBlock = document.getElementById('result');

            if (data) {
                resultBlock.innerHTML = `
                    <h2 id="part-name">${bestMatch.className.replace(/\./g, '')}</h2>
                    <div id="details" style="display: block; text-align: left; border-top: 1px solid #ccc; padding-top: 10px;">
                        <p><span class="info-label">Design ID:</span> ${data.ids}</p>
                        <p><span class="info-label">Market Price:</span> <span class="price-tag">${data.price}</span></p>
                    </div>
                `;
            } else {
                resultBlock.innerHTML = `
                    <h2 style="color: #e60012;">NOT IN BASE</h2>
                    <p>ИИ выдал: <b>"${bestMatch.className}"</b></p>
                `;
            }
        });

        init();
    </script>
</body>
</html>
