<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGO AI Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffcf00;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 10px 10px 0px #e60012;
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 4px solid #000;
        }
        h1 {
            color: #e60012;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            -webkit-text-stroke: 1px black;
        }
        .btn {
            background-color: #e60012;
            color: white;
            padding: 12px 25px;
            border: 2px solid black;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            display: inline-block;
            margin: 10px;
        }
        #imageUpload { display: none; }
        #preview {
            max-width: 100%;
            border-radius: 10px;
            margin: 20px 0;
            border: 3px solid #555;
            display: none;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            background-color: #f0f0f0;
            border-radius: 10px;
            border: 2px dashed #333;
            text-align: left;
        }
        #part-name { color: #0055ad; font-size: 24px; text-align: center; margin: 10px 0; }
        .info-label { font-weight: bold; color: #333; }
        .price-tag { color: #28a745; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>LEGO AI Scanner</h1>
        <input type="file" id="imageUpload" accept="image/*">
        <label for="imageUpload" class="btn">CHOOSE PART</label>
        <img id="preview" src="#" alt="Preview">
        <button id="scan-btn" class="btn" style="display:none; background-color: #0055ad;">SCAN PART</button>
        <div id="result">
            <h2 id="part-name">Ready to work</h2>
            <div id="details" style="display:none;">
                <p><span class="info-label">Design ID:</span> <span id="part-id"></span></p>
                <p><span class="info-label">Market Price:</span> <span id="part-price" class="price-tag"></span></p>
            </div>
        </div>
    </div>

    <script>
        const URL = "https://teachablemachine.withgoogle.com/models/9a2XHS5dZ/";
        
        const legoDatabase = {
            "Brown Brick 2x2": { price: "18 rubles", ids: "4623773, 6014520, 6092677" },
            "Blue Grille 2x1": { price: "14 rubles", ids: "6152109" },
            "Red Round Plate 2x2": { price: "14 rubles", ids: "6132541" },
            "Dark Grey Brick 2x2": { price: "18 rubles", ids: "4211060" },
            "Grey Brick With 2 Studs 2x1": { price: "11 rubles", ids: "6015344" },
            "Black Plate 2x3": { price: "7 rubles", ids: "302126" },
            "Orange Plate 2x2": { price: "6 rubles", ids: "4159007" },
            "Grey Brick 6x2": { price: "22 rubles", ids: "4211795, 4274668" },
            "Black Brick 4x1": { price: "13 rubles", ids: "301026" },
            "Tan Brick 4x1": { price: "12 rubles", ids: "301005" },
            "Grey Plate With 4 Studs 4x3": { price: "50 rubles", ids: "6132741, 6550154" },
            "Grey Corner Brick 2x2": { price: "12 rubles", ids: "4211109" },
            "Dark Orange Plate With 1 Stud 1x2": { price: "14 rubles", ids: "6092602" },
            "Black Brick 1x1": { price: "13 rubles", ids: "300526" },
            "Grey Slope 45 2x1": { price: "4 rubles", ids: "4211135" },
            "Grey Inverted Slope 2x2": { price: "5 rubles", ids: "4211000" },
            "Orange Plate 4x1": { price: "10 rubles", ids: "4118782" },
            "Orange Plate 2x1": { price: "11 rubles", ids: "4177932" },
            "Inverted Orange Slope 33 3x2": { price: "12 rubles", ids: "4121737" },
            "Tan Masonry Brick 2x1": { price: "20 rubles", ids: "4646577" }
        };

        let model, maxPredictions;

        async function init() {
            model = await tmImage.load(URL + "model.json", URL + "metadata.json");
            maxPredictions = model.getTotalClasses();
        }

        document.getElementById('imageUpload').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function() {
                const img = document.getElementById('preview');
                img.src = reader.result;
                img.style.display = 'block';
                document.getElementById('scan-btn').style.display = 'inline-block';
                document.getElementById('part-name').innerText = "READY TO SCAN";
                document.getElementById('details').style.display = 'none';
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        document.getElementById('scan-btn').addEventListener('click', async function() {
            const img = document.getElementById('preview');
            const prediction = await model.predict(img);
            
            let bestMatch = { className: "", probability: 0 };
            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability > bestMatch.probability) {
                    bestMatch = prediction[i];
                }
            }

            const className = bestMatch.className.trim();
            
            // Находим данные в базе (игнорируем регистр)
            const dbKey = Object.keys(legoDatabase).find(k => k.toLowerCase() === className.toLowerCase());
            const data = legoDatabase[dbKey];

            // ВНИМАНИЕ: Если данные нашлись, мы ПРИНУДИТЕЛЬНО переписываем весь блок результата
            if (data) {
                document.getElementById('result').innerHTML = `
                    <h2 style="color: #0055ad; text-align: center; margin: 10px 0;">${className.toUpperCase()}</h2>
                    <div style="display: block; padding: 10px; border-top: 1px solid #ccc;">
                        <p><b>Design ID:</b> ${data.ids}</p>
                        <p><b>Price:</b> <span style="color: #28a745; font-weight: bold;">${data.price}</span></p>
                    </div>
                `;
            } else {
                document.getElementById('part-name').innerText = className.toUpperCase() + " (NOT IN BASE)";
            }
        });

        init();
    </script>
</body>
</html>
